<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Auto-Spec | Serwis</title>
</head>
<body>
    <nav><div class="nav-container"><b style="color:white; font-size:1.2em;">🛠 AUTO-SPEC</b><div><a href="/">Serwis</a><a href="/sklep">Sklep</a><a href="/login">Admin</a></div></div></nav>
    <header><h1>Serwis Samochodowy</h1><p>Szybkie terminy, profesjonalna obsługa.</p></header>
    <div class="container">
        <div class="card">
            <h2>Umów wizytę online</h2>
            <form action="/add-request-client" method="POST">
                <input type="text" name="client" placeholder="Imię i Nazwisko" required>
                <input type="tel" name="phone" placeholder="Telefon kontaktowy" required>
                <input type="text" name="car" placeholder="Auto (np. Audi A4)" required>
                <input type="text" name="vin" placeholder="Numer VIN">
                <select name="service_type">
                    <option value="Mechanika">Mechanika ogólna</option>
                    <option value="Olej">Serwis olejowy</option>
                    <option value="Klima">Klimatyzacja</option>
                </select>
                <textarea name="desc" placeholder="Opis problemu..."></textarea>
                <button type="submit" class="btn">Wyślij zgłoszenie</button>
            </form>
        </div>
    </div>
    <footer>
        <div class="footer-grid">
            <div><h4>Kontakt</h4><p>📞 +48 123 456 789</p><p>📧 biuro@auto-spec.pl</p></div>
            <div><h4>Adres</h4><p>ul. Warsztatowa 1</p><p>32-551 Babice</p></div>
            <div><h4>Godziny</h4><p>Pn-Pt: 8:00 - 17:00</p></div>
        </div>
    </footer>
</body>
</html>
