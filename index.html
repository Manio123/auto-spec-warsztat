<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Auto-Spec | Warsztat</title>
</head>
<body>
    <nav>
        <div class="nav-container">
            <b style="color:white; font-size:1.2em;">🛠 AUTO-SPEC</b>
            <div>
                <a href="/">Serwis</a>
                <a href="/sklep">Sklep</a>
                <a href="/login" style="background:rgba(255,255,255,0.1); padding:5px 10px; border-radius:4px;">🔑 Admin</a>
            </div>
        </div>
    </nav>
    <header><h1>Profesjonalny Serwis</h1><p>Szybkie terminy, pewna naprawa.</p></header>
    <div class="container">
        <div class="card">
            <h2>Umów wizytę</h2>
            <form action="/add-request-client" method="POST">
                <input type="text" name="client" placeholder="Imię i Nazwisko" required>
                <input type="tel" name="phone" placeholder="Twój Telefon" required>
                <input type="text" name="car" placeholder="Marka i Model auta" required>
                <input type="text" name="vin" placeholder="Numer VIN (opcjonalnie)">
                <select name="service_type">
                    <option value="Naprawa Mechaniczna">Naprawa Mechaniczna</option>
                    <option value="Przegląd/Olej">Przegląd / Olej</option>
                    <option value="Klimatyzacja">Klimatyzacja</option>
                </select>
                <textarea name="desc" placeholder="Opisz co dzieje się z autem..."></textarea>
                <button type="submit" class="btn">Wyślij Zgłoszenie</button>
            </form>
        </div>
    </div>
    <footer><p>© 2026 Auto-Spec Babice | ul. Warsztatowa 1</p></footer>
</body>
</html>
