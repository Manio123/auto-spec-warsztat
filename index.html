<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Auto-Spec | Serwis</title>
</head>
<body>
    <nav><div class="nav-container"><b style="color:white; font-size:1.4em;">🛠 AUTO-SPEC</b><div><a href="/">Serwis</a><a href="/sklep">Sklep</a></div></div></nav>
    <header><h1>Serwis Samochodowy</h1><p>Umów się na wizytę online</p></header>
    <div class="container">
        <div class="card">
            <h2>Zgłoś naprawę</h2>
            <form action="/add-request-client" method="POST">
                <input type="text" name="client" placeholder="Imię i Nazwisko" required>
                <input type="tel" name="phone" placeholder="Telefon" required>
                <input type="text" name="car" placeholder="Auto (Model, Rok)" required>
                <input type="text" name="vin" placeholder="Numer VIN">
                <select name="service_type">
                    <option value="Mechanika">Mechanika Ogólna</option>
                    <option value="Olej">Wymiana Oleju</option>
                    <option value="Klima">Klimatyzacja</option>
                </select>
                <textarea name="desc" placeholder="Opis usterki..."></textarea>
                <button type="submit" class="btn">Wyślij Zgłoszenie</button>
            </form>
        </div>
    </div>
    <footer>
        <div class="footer-grid">
            <div><h4>KONTAKT</h4><p>📞 +48 123 456 789</p><p>📧 serwis@auto-spec.pl</p></div>
            <div><h4>ADRES</h4><p>ul. Warsztatowa 1, 32-551 Babice</p></div>
        </div>
    </footer>
</body>
</html>
