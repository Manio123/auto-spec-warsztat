<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sklep | Auto-Spec</title>
</head>
<body>
    <nav>
        <div class="nav-container">
            <b style="color:white; font-size:1.4em;">🛠 AUTO-SPEC</b>
            <div>
                <a href="/">Serwis</a>
                <a href="/sklep">Sklep</a>
                <a href="/koszyk" style="color:var(--accent); font-size:1.2em;">🛒 <span id="cart-counter">[0]</span></a>
            </div>
        </div>
    </nav>

    <header><h1>Sklep Części</h1><p>Wybierz podzespoły i sprawdź koszyk.</p></header>

    <div class="container">
        <div class="products-grid">
            </div>
    </div>

    <footer>
        <div class="footer-grid">
            <div><h4 style="color:var(--accent);">KONTAKT</h4><p>📞 +48 123 456 789</p><p>ul. Warsztatowa 1, Babice</p></div>
        </div>
    </footer>

    <script>
        function updateCounter() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cart-counter').innerText = "[" + count + "]";
        }

        function addToCart(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const idx = cart.findIndex(i => i.id === id);
            if(idx > -1) cart[idx].qty += 1;
            else cart.push({id, name, price, qty: 1});
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCounter();
            alert('Dodano: ' + name);
        }
        updateCounter();
    </script>
</body>
</html>
