<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sklep | Auto-Spec</title>
</head>
<body>
    <nav><div class="nav-container"><b style="color:white; font-size:1.2em;">🛠 AUTO-SPEC</b><div><a href="/">Serwis</a><a href="/sklep">Sklep</a><span id="cart-counter" style="color:var(--accent); margin-left:15px; font-weight:bold;">🛒 [0]</span></div></div></nav>
    <header><h1>Części Zamienne</h1><p>Najwyższa jakość w dobrych cenach.</p></header>
    <div class="container"><div class="products-grid"></div></div>
    <div id="cart-panel" style="display:none;">
        <h3 style="margin-top:0;">Twój Koszyk</h3>
        <ul id="cart-items" style="list-style:none; padding:0; margin-bottom:15px; border-bottom:1px solid #eee;"></ul>
        <p>Razem: <b><span id="cart-total">0.00</span> PLN</b></p>
        <button class="btn" style="margin-bottom:5px;" onclick="alert('Przejście do kasy...')">Zamów</button>
        <button class="btn btn-danger" onclick="clearCart()">Wyczyść</button>
    </div>
    <script>
        let cart = [];
        function addToCart(id, name, price, quantity) {
            const qty = parseInt(quantity);
            if(qty < 1) return;
            const idx = cart.findIndex(i => i.id === id);
            if(idx > -1) cart[idx].qty += qty;
            else cart.push({id, name, price, qty});
            updateCart();
        }
        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCart();
        }
        function updateCart() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('cart-counter').innerText = "🛒 [" + count + "]";
            document.getElementById('cart-total').innerText = total.toFixed(2);
            document.getElementById('cart-panel').style.display = cart.length > 0 ? 'block' : 'none';
            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <li style="font-size:0.85em; margin-bottom:8px; display:flex; justify-content:space-between;">
                    <span>${i.qty}x ${i.name}</span>
                    <button onclick="removeFromCart(${i.id})" style="border:none; color:red; cursor:pointer; background:none;">X</button>
                </li>
            `).join('');
        }
        function clearCart() { cart = []; updateCart(); }
    </script>
</body>
</html>
