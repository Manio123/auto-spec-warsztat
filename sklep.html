<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sklep Części | Auto-Spec</title>
</head>
<body>
    <nav>
        <div class="nav-container">
            <b style="color:white;">🛠 AUTO-SPEC</b>
            <div>
                <a href="/">Serwis</a>
                <a href="/sklep">Sklep</a>
                <a href="/koszyk" style="color:var(--accent); font-weight:bold; margin-left:15px;">🛒 <span id="cart-counter">[0]</span></a>
            </div>
        </div>
    </nav>
    <header><h1>Sklep z Częściami</h1></header>
    <div class="container">
        <div class="products-grid">
            </div>
    </div>
    <script>
        function updateCounter() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-counter').innerText = "[" + cart.reduce((s, i) => s + i.qty, 0) + "]";
        }
        function addToCart(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const idx = cart.findIndex(i => i.id === id);
            if(idx > -1) cart[idx].qty += 1;
            else cart.push({id, name, price, qty: 1});
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCounter();
            alert('Dodano do koszyka!');
        }
        updateCounter();
    </script>
</body>
</html>
